name: Update Nuvio Scrapers

on:
  schedule:
    # S'exécute tous les jours à 05:00 (Heure UTC, ajuste selon ton fuseau si besoin)
    - cron: '0 5 * * *'
  workflow_dispatch: # Permet aussi de le lancer manuellement depuis l'interface GitHub

jobs:
  sync-domains:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du repository
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 🔄 Exécution du script de synchronisation
        run: node sync_providers.js

      - name: 📤 Commit et Push si modifications détectées
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add providers/*.js manifest.json
          
          # Si "git diff" détecte des changements dans la file d'attente, il commit, sinon il s'arrête
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Synchronisation des domaines depuis source.json" && git push)
