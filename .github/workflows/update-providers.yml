name: Mettre à jour les providers depuis sources.json

on:
  push:
    paths:
      - 'sources.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-providers:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Mettre à jour les providers
        run: |
          node --input-type=commonjs << 'EOF'
          const fs = require('fs');
          const path = require('path');

          // ----- 1) Fonction pour extraire un domaine depuis un wiki -----
          async function fetchDomainFromWiki(url) {
            try {
              const resp = await fetch(url);
              const html = await resp.text();
              // Cas toflix.wiki : "Domaine actuel # toflix.fit"
              let match = html.match(/Domaine actuel # ([a-z0-9.-]+)/i);
              if (match) return match[1];
              // Cas purstream.wiki : chercher "purstream.qqch"
              match = html.match(/purstream\.[a-z]{2,}/i);
              return match ? match[0] : null;
            } catch(e) {
              console.warn(`❌ Échec scraping ${url}`, e.message);
              return null;
            }
          }

          // ----- 2) Charger sources.json -----
          if (!fs.existsSync('sources.json')) {
            console.error('❌ sources.json introuvable');
            process.exit(1);
          }
          const sources = JSON.parse(fs.readFileSync('sources.json', 'utf8'));
          const allItems = [
            ...(sources.films_series || []),
            ...(sources.animes || []),
            ...(sources.direct_tv || [])
          ];

          // ----- 3) Mapping provider -> fichier + variables + wiki -----
          const providerMap = [
            { 
              nameMatch: /purstream/i, 
              file: 'providers/purstream.js', 
              varName: 'PURSTREAM_FALLBACK',
              varRegex: /(var\s+PURSTREAM_FALLBACK\s*=\s*['"])([^'"]*)(['"])/i,
              wikiUrl: 'https://purstream.wiki/'
            },
            { 
              nameMatch: /anime-sama/i, 
              file: 'providers/anime-sama.js', 
              varName: 'AS_FALLBACK',
              varRegex: /(var\s+AS_FALLBACK\s*=\s*['"])([^'"]*)(['"])/i,
              wikiUrl: null
            },
            { 
              nameMatch: /toflix/i, 
              file: 'providers/toflix.js', 
              varName: 'TOFLIX_FALLBACK',
              varRegex: /(var\s+TOFLIX_FALLBACK\s*=\s*['"])([^'"]*)(['"])/i,
              wikiUrl: 'https://toflix.wiki/'
            }
          ];

          let modifiedCount = 0;

          for (const item of allItems) {
            const nom = item.nom;
            for (const provider of providerMap) {
              if (provider.nameMatch.test(nom)) {
                let tld = null;

                // Si le provider a un wiki, on extrait le domaine réel
                if (provider.wikiUrl) {
                  const domain = await fetchDomainFromWiki(provider.wikiUrl);
                  if (domain) {
                    const parts = domain.split('.');
                    tld = parts.slice(1).join('.');  // ex: toflix.fit -> fit | purstream.cx -> cx
                    console.log(`🔍 ${provider.file} : domaine extrait = ${domain} → TLD = ${tld}`);
                  } else {
                    console.warn(`⚠️ Aucun domaine trouvé via wiki pour ${nom}, fallback sur sources.json`);
                    // Fallback : extraire TLD depuis l'URL de sources.json
                    if (item.url) {
                      try {
                        const host = new URL(item.url).hostname;
                        const parts = host.split('.');
                        tld = parts.slice(1).join('.');
                      } catch(e) {}
                    }
                  }
                } else {
                  // Providers sans wiki : on utilise l'URL de sources.json
                  if (item.url) {
                    try {
                      const host = new URL(item.url).hostname;
                      const parts = host.split('.');
                      tld = parts.slice(1).join('.');
                    } catch(e) {}
                  }
                }

                if (!tld) {
                  console.warn(`❌ Impossible d'extraire un TLD pour ${nom}`);
                  continue;
                }

                const filePath = provider.file;
                if (!fs.existsSync(filePath)) {
                  console.warn(`⚠️ Fichier ${filePath} introuvable, sautée`);
                  continue;
                }

                let content = fs.readFileSync(filePath, 'utf8');
                const newContent = content.replace(provider.varRegex, `$1${tld}$3`);
                if (newContent !== content) {
                  fs.writeFileSync(filePath, newContent, 'utf8');
                  console.log(`✅ ${filePath} : ${provider.varName} = '${tld}'`);
                  modifiedCount++;
                } else {
                  console.log(`ℹ️ ${filePath} : aucune modification nécessaire`);
                }
                break;
              }
            }
          }

          // Optionnel : régénérer manifest.json
          if (fs.existsSync('providers')) {
            const files = fs.readdirSync('providers').filter(f => f.endsWith('.js'));
            const manifest = {
              name: "Catalogue Ultime Nissay",
              version: "1.0.0",
              scrapers: files.map(file => {
                const id = file.replace('.js', '');
                return {
                  id: `${id}_nissay`,
                  name: id.toUpperCase(),
                  description: `Extension synchronisée pour ${id}`,
                  version: "1.0.0",
                  author: "Nissay",
                  supportedTypes: ["movie", "tv"],
                  filename: `providers/${file}`,
                  enabled: true,
                  formats: ["mp4", "m3u8"],
                  contentLanguage: ["fr"]
                };
              })
            };
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2), 'utf8');
            console.log(`📄 manifest.json régénéré (${files.length} scrapers)`);
          }

          console.log(`\n🚀 Terminé. ${modifiedCount} fichier(s) provider modifié(s).`);
          EOF

      - name: Commit et push des changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add providers/*.js manifest.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Mise à jour automatique des providers (domaines extraits des wikis)"
          git push
