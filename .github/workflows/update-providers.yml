name: Super Synchronisation Catalogue Nuvio

on:
  push:
    paths:
      - 'sources.json'

permissions:
  contents: write

jobs:
  build-catalogue:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4

      - name: Mettre à jour les domaines et le Manifest
        run: |
          node -e '
          const fs = require("fs");
          const path = require("path");

          // 1. Sécurité : Vérification du fichier sources.json
          if (!fs.existsSync("sources.json")) {
            console.log("❌ sources.json introuvable.");
            process.exit(1);
          }

          let sources;
          try {
            sources = JSON.parse(fs.readFileSync("sources.json", "utf8"));
          } catch (e) {
            console.log("❌ sources.json invalide.");
            process.exit(1);
          }

          // 2. Mise à jour spécifique de Purstream si présent
          const allItems = [
            ...(sources.films_series || []), 
            ...(sources.animes || []), 
            ...(sources.direct_tv || [])
          ];
          const purstreamData = allItems.find(item => item.nom && item.nom.toLowerCase().includes("purstream"));

          if (purstreamData && purstreamData.url && fs.existsSync("providers/purstream.js")) {
            try {
              const urlObj = new URL(purstreamData.url);
              const ext = urlObj.hostname.split(".").pop();
              let providerCode = fs.readFileSync("providers/purstream.js", "utf8");
              providerCode = providerCode.replace(/var PURSTREAM_FALLBACK\s*=\s*['"'].*?['"'];/, `var PURSTREAM_FALLBACK = "${ext}";`);
              fs.writeFileSync("providers/purstream.js", providerCode, "utf8");
              console.log("✅ Extension Purstream synchronisée avec le domaine ." + ext);
            } catch (err) {
              console.log("⚠️ Erreur traitement URL Purstream : " + err.message);
            }
          }

          // 3. GÉNÉRATION AUTOMATIQUE DU MANIFEST GLOBAL
          const manifest = {
            "name": "Mon Catalogue Global Nissay",
            "version": "1.0.0",
            "scrapers": []
          };

          const providersDir = "providers";
          if (fs.existsSync(providersDir)) {
            const files = fs.readdirSync(providersDir).filter(f => f.endsWith(".js"));
            
            files.forEach(file => {
              const filename = `providers/${file}`;
              const id = file.replace(".js", "");
              
              // On crée automatiquement la configuration pour Nuvio pour CHAQUE fichier trouvé
              manifest.scrapers.push({
                "id": `${id}_nissay`,
                "name": id.toUpperCase(),
                "description": `Extension Nuvio pour ${id}`,
                "version": "1.0.0",
                "author": "Nissay",
                "supportedTypes": ["movie", "tv"],
                "filename": filename,
                "enabled": true,
                "formats": ["mp4", "m3u8"],
                "contentLanguage": ["fr"]
              });
            });
          }

          fs.writeFileSync("manifest.json", JSON.stringify(manifest, null, 2), "utf8");
          console.log("✅ manifest.json généré avec succès ! Nombre d extensions intégrées : " + manifest.scrapers.length);
          '

      - name: Sauvegarder les modifications sur GitHub
        run: |
          git config --global user.name "NissayBot"
          git config --global user.email "bot@github.com"
          git add providers/*.js manifest.json
          git diff-index --quiet HEAD || git commit -m "🤖 Robot : Synchronisation globale du catalogue Nuvio"
          git push
