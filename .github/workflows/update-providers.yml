name: Forcer la mise à jour du manifest.json

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Régénérer manifest.json
        run: |
          node -e "
          const fs = require('fs');
          const files = fs.readdirSync('providers').filter(f => f.endsWith('.js'));
          const manifest = {
            name: 'Catalogue Ultime Nissay',
            version: '1.0.0',
            scrapers: files.map(file => {
              const id = file.replace('.js', '');
              return {
                id: `${id}_nissay`,
                name: id.toUpperCase(),
                description: `Extension synchronisée pour ${id}`,
                version: '1.0.0',
                author: 'Nissay',
                supportedTypes: ['movie', 'tv'],
                filename: `providers/${file}`,
                enabled: true,
                formats: ['mp4', 'm3u8'],
                contentLanguage: ['fr']
              };
            })
          };
          fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2));
          console.log('manifest.json mis à jour avec', files.length, 'scrapers');
          "

      - name: Commit et push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --quiet && git diff --staged --quiet || git commit -m "📄 Forcer mise à jour manifest.json"
          git push
