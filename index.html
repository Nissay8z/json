<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NissStream — Votre Stremio Perso</title>
<meta name="description" content="Moteur de recherche streaming VF — Films, Séries, Animes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root{
  --bg:#07070f;--bg2:#0c0c1a;--bg3:#111122;--bg4:#161628;
  --s:rgba(255,255,255,0.04);--s2:rgba(255,255,255,0.07);--s3:rgba(255,255,255,0.11);
  --b:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.14);--b3:rgba(255,255,255,0.22);
  --t:#f2f2f7;--t2:#a1a1b5;--t3:#6e6e82;
  --p:#6366f1;--p-rgb:99,102,241;--p2:#4f46e5;--p3:#4338ca;
  --err:#ef4444;--ok:#10b981;
  --ff:'Outfit',sans-serif;--ff-mono:'JetBrains Mono',monospace;--r:16px;--r2:12px;--gap:24px;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--ff);-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden;padding-bottom:60px}
header{display:flex;align-items:center;justify-content:space-between;padding:20px var(--gap);border-bottom:1px solid var(--b);background:rgba(7,7,15,0.7);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;gap:20px}
.logo{font-weight:900;font-size:1.4rem;background:linear-gradient(135deg,#fff 30%,var(--p) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px;cursor:pointer;display:flex;align-items:center;gap:8px}
.logo::before{content:'';display:inline-block;width:12px;height:12px;background:var(--p);border-radius:3px;box-shadow:0 0 12px var(--p)}
.search-bar{position:relative;flex:1;max-width:480px}
.search-bar input{width:100%;background:var(--bg2);border:1px solid var(--b);border-radius:var(--r2);padding:12px 16px 12px 42px;color:var(--t);font-size:0.95rem;transition:all 0.2s}
.search-bar input:focus{border-color:var(--p);background:var(--bg3);outline:none;box-shadow:0 0 0 4px rgba(var(--p-rgb),0.15)}
.search-bar svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--t3);pointer-events:none}
.search-dropdown{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);box-shadow:0 12px 32px rgba(0,0,0,0.5);max-height:420px;overflow-y:auto;z-index:110;display:none;padding:8px}
.search-dropdown.show{display:block}
.s-item{display:flex;gap:12px;padding:8px;border-radius:var(--r2);cursor:pointer}
.s-item:hover{background:var(--s2)}
.s-item img{width:45px;height:65px;object-fit:cover;border-radius:6px;background:var(--bg4)}
.s-info{display:flex;flex-direction:column;justify-content:center;gap:4px;min-width:0}
.s-title{font-weight:600;font-size:0.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-meta{font-size:0.8rem;color:var(--t3);display:flex;align-items:center;gap:8px}
.s-badge{background:var(--s3);color:var(--t2);padding:2px 6px;border-radius:4px;font-size:0.75rem;font-weight:600}
main{padding:var(--gap);max-width:1400px;margin:0 auto;display:flex;flex-direction:column;gap:40px}
.section-title{font-size:1.25rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px}
.card{position:relative;border-radius:var(--r);overflow:hidden;background:var(--bg2);border:1px solid var(--b);cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);border-color:var(--b3)}
.card-img-wrap{position:relative;width:100%;padding-top:150%;background:var(--bg4)}
.card img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.card-type{position:absolute;top:10px;left:10px;background:rgba(7,7,15,0.75);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);padding:4px 8px;border-radius:6px;font-size:0.75rem;font-weight:600;color:var(--t2);z-index:2}
.card-info{padding:12px;display:flex;flex-direction:column;gap:4px;flex:1}
.card-title{font-weight:600;font-size:0.9rem;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;height:2.6em}
.card-meta{font-size:0.78rem;color:var(--t3);display:flex;justify-content:space-between;align-items:center;margin-top:auto}

/* PLAYER POPUP */
.player-modal{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(4,4,8,0.98);backdrop-filter:blur(20px);z-index:200;display:none;overflow-y:auto}
.player-modal.show{display:block}
.p-container{max-width:1100px;margin:40px auto;padding:0 var(--gap);display:flex;flex-direction:column;gap:20px}
.p-header{display:flex;align-items:center;justify-content:space-between;gap:20px}
.p-back{background:var(--bg3);border:1px solid var(--b2);padding:10px 16px;border-radius:var(--r2);color:var(--t);font-size:0.9rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px}
.p-title-block{flex:1;min-width:0}
.p-main-title{font-size:1.4rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-sub-title{font-size:0.9rem;color:var(--t2);margin-top:2px}
.video-wrapper{position:relative;width:100%;padding-top:56.25%;background:#000;border-radius:var(--r);overflow:hidden;border:1px solid var(--b2);box-shadow:0 20px 50px rgba(0,0,0,0.6)}
.video-wrapper video{position:absolute;top:0;left:0;width:100%;height:100%;outline:none}

.ep-selector{display:flex;flex-direction:column;gap:16px;background:var(--bg2);border:1px solid var(--b);padding:20px;border-radius:var(--r)}
.season-select-wrapper{display:flex;align-items:center;gap:10px}
.season-select{background:var(--bg3);border:1px solid var(--b3);color:var(--t);padding:8px 16px;border-radius:var(--r2);font-size:0.9rem;font-weight:600;outline:none;cursor:pointer}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(65px,1fr));gap:10px;max-height:200px;overflow-y:auto}
.ep-btn{background:var(--bg3);border:1px solid var(--b2);border-radius:8px;padding:10px;color:var(--t);font-size:0.88rem;font-weight:600;cursor:pointer;text-align:center}
.ep-btn.active{background:var(--p);border-color:var(--p);color:#fff}

.provider-box{background:var(--bg2);border:1px solid var(--b);padding:20px;border-radius:var(--r);display:flex;flex-direction:column;gap:12px}
.provider-title{font-size:0.95rem;font-weight:700;color:var(--t2);display:flex;align-items:center;gap:8px}
.stream-list{display:flex;flex-direction:column;gap:8px}
.stream-item{background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r2);padding:14px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all 0.2s}
.stream-item:hover{background:var(--bg4);transform:translateX(2px)}
.stream-item.active{border-color:var(--p);background:rgba(99,102,241,0.05)}
.st-meta{display:flex;flex-direction:column;gap:4px}
.st-name{font-weight:700;font-size:0.95rem;color:#fff}
.st-desc{font-size:0.8rem;color:var(--t3)}
.st-action{background:var(--p);color:#fff;padding:8px 14px;border-radius:8px;font-size:0.85rem;font-weight:600}
.stream-item.active .st-action{background:var(--ok)}

.loader-stream{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:30px 0;color:var(--t3);font-size:0.9rem}
.spinner{width:24px;height:24px;border:2px solid var(--s3);border-top-color:var(--p);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.histo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
.hcard{position:relative;background:var(--bg2);border:1px solid var(--b);border-radius:var(--r2);padding:10px;cursor:pointer;display:flex;gap:12px}
.hcard img{width:50px;height:70px;object-fit:cover;border-radius:6px}
.hcard-info{display:flex;flex-direction:column;justify-content:center;gap:4px;min-width:0;flex:1}
.hcard-title{font-weight:600;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hcard-date{font-size:0.78rem;color:var(--t3)}
.hcard-del{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--t3);cursor:pointer}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="location.reload()">Niss<span>Stream</span></div>
  <div class="search-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="text" id="s-input" placeholder="Rechercher un film, une série, un anime..." autocomplete="off">
    <div class="search-dropdown" id="s-drop"></div>
  </div>
</header>

<main>
  <section id="sec-histo" style="display:none;">
    <div class="section-title">Reprendre la lecture</div>
    <div id="histo-wrap"></div>
  </section>

  <section>
    <div class="section-title">Films Tendances</div>
    <div class="grid" id="grid-movies"></div>
  </section>

  <section>
    <div class="section-title">Séries & Animes Populaires</div>
    <div class="grid" id="grid-tv"></div>
  </section>
</main>

<div class="player-modal" id="p-modal">
  <div class="p-container">
    <div class="p-header">
      <button class="p-back" onclick="closePlayer()">✕ Fermer</button>
      <div class="p-title-block">
        <div class="p-main-title" id="p-title">Chargement...</div>
        <div class="p-sub-title" id="p-subtitle">Veuillez patienter</div>
      </div>
    </div>

    <div class="video-wrapper">
      <video id="main-video" controls autoplay playsinline></video>
    </div>

    <div class="ep-selector" id="box-episodes" style="display:none;">
      <div class="season-select-wrapper">
        <span style="color:var(--t2); font-weight:600;">Saison :</span>
        <select class="season-select" id="select-season" onchange="onSeasonChange()"></select>
      </div>
      <div class="ep-grid" id="grid-episodes"></div>
    </div>

    <div class="provider-box">
      <div class="provider-title">⚡ Flux Vidéos (NissStream Server Cloudflare)</div>
      <div id="streams-container"></div>
    </div>
  </div>
</div>

<script>
const TMDB_KEY = 'f3d757824f08ea2cff45eb8f47ca3a1e';
const IMG_BASE = 'https://image.tmdb.org/t/p/w300';
// CONNEXION DIRECTE A TON WORKER DEPLOYE
const WORKER_URL = 'https://super-field-ee7f.yraseloued.workers.dev';

let currentMedia = { id: null, type: null, title: '', poster: '', season: 1, episode: 1 };
let hls = null;

async function queryTMDB(endpoint, query = '') {
  const res = await fetch(`https://api.themoviedb.org/3/${endpoint}?api_key=${TMDB_KEY}&language=fr-FR${query}`);
  return res.json();
}

async function initPage() {
  const m = await queryTMDB('trending/movie/week');
  const t = await queryTMDB('trending/tv/week');
  if(m.results) renderGrid(m.results, 'movie', 'grid-movies');
  if(t.results) renderGrid(t.results, 'tv', 'grid-tv');
  loadHistoUI();
}

function renderGrid(items, type, elId) {
  document.getElementById(elId).innerHTML = items.map(i => {
    const title = i.title || i.name;
    const poster = i.poster_path ? IMG_BASE + i.poster_path : 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
    return `
      <div class="card" onclick="openPlayer('${i.id}', '${type}', '${title.replace(/'/g, "\\'")}', '${poster}')">
        <div class="card-type">${type === 'movie' ? 'Film' : 'Série'}</div>
        <div class="card-img-wrap"><img src="${poster}"></div>
        <div class="card-info">
          <div class="card-title">${title}</div>
          <div class="card-meta"><span style="color:var(--p); font-weight:700;">★ ${i.vote_average.toFixed(1)}</span></div>
        </div>
      </div>
    `;
  }).join('');
}

// Barre de recherche
const sInput = document.getElementById('s-input');
const sDrop = document.getElementById('s-drop');
sInput.addEventListener('input', async () => {
  const q = sInput.value.trim();
  if(q.length < 2) { sDrop.classList.remove('show'); return; }
  const res = await queryTMDB('search/multi', `&query=${encodeURIComponent(q)}`);
  const items = (res.results || []).filter(i => i.media_type === 'movie' || i.media_type === 'tv').slice(0, 6);
  
  sDrop.innerHTML = items.map(i => `
    <div class="s-item" onclick="openPlayer('${i.id}', '${i.media_type}', '${(i.title || i.name).replace(/'/g, "\\'")}', '${IMG_BASE + i.poster_path}')">
      <img src="${IMG_BASE + i.poster_path}">
      <div class="s-info">
        <div class="s-title">${i.title || i.name}</div>
        <div class="s-meta"><span class="s-badge">${i.media_type.toUpperCase()}</span></div>
      </div>
    </div>
  `).join('');
  sDrop.classList.add('show');
});

// Appeler ton Worker pour charger les liens sur ton site
async function openPlayer(id, type, title, poster, season = 1, episode = 1) {
  sDrop.classList.remove('show');
  sInput.value = '';
  currentMedia = { id, type, title, poster, season, episode };
  
  document.getElementById('p-modal').classList.add('show');
  document.getElementById('p-title').innerText = title;
  document.getElementById('p-subtitle').innerText = type === 'movie' ? 'Film' : `Saison ${season} • Épisode ${episode}`;
  
  killVideo();

  if(type === 'tv') {
    document.getElementById('box-episodes').style.display = 'flex';
    await buildSeasonsUI(id, season, episode);
  } else {
    document.getElementById('box-episodes').style.display = 'none';
  }

  await loadLinksFromWorker();
  saveHisto();
}

async function loadLinksFromWorker() {
  const container = document.getElementById('streams-container');
  container.innerHTML = '<div class="loader-stream"><div class="spinner"></div>Interrogation globale de vos serveurs de streaming...</div>';
  
  // Formatage de la requête Stremio envoyée à ton propre Worker
  const streamPath = currentMedia.type === 'movie' ? `/stream/movie/${currentMedia.id}.json` : `/stream/series/${currentMedia.id}:${currentMedia.season}:${currentMedia.episode}.json`;
  
  try {
    const response = await fetch(WORKER_URL + streamPath).then(r => r.json());
    const streams = response.streams || [];
    
    if(!streams.length) {
      container.innerHTML = '<div style="color:var(--err); padding:10px 0; font-size:0.9rem;">Aucune source trouvée pour ce titre (Vérifiez les providers actifs de votre Worker).</div>';
      return;
    }

    container.innerHTML = streams.map((s, idx) => `
      <div class="stream-item ${idx === 0 ? 'active' : ''}" onclick="launchVideo('${s.url}', this)">
        <div class="st-meta">
          <div class="st-name">${s.name}</div>
          <div class="st-desc">${s.title.replace(/\n/g, ' ')}</div>
        </div>
        <div class="st-action">${idx === 0 ? 'Lecture' : 'Lancer'}</div>
      </div>
    `).join('');

    launchVideo(streams[0].url, container.querySelector('.stream-item'));

  } catch(e) {
    container.innerHTML = '<div style="color:var(--err); padding:10px 0; font-size:0.9rem;">Erreur de connexion avec votre Worker Cloudflare.</div>';
  }
}

function launchVideo(url, element) {
  const video = document.getElementById('main-video');
  document.querySelectorAll('.stream-item').forEach(el => {
    el.classList.remove('active');
    if(el.querySelector('.st-action')) el.querySelector('.st-action').innerText = 'Lancer';
  });
  element.classList.add('active');
  element.querySelector('.st-action').innerText = 'Lecture';

  if(hls) { hls.destroy(); hls = null; }

  if(url.includes('.m3u8') && Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>null));
  } else {
    video.src = url;
    video.play().catch(()=>null);
  }
}

async function buildSeasonsUI(tvId, actS, actE) {
  const data = await queryTMDB(`tv/${tvId}`);
  const select = document.getElementById('select-season');
  const seasons = (data.seasons || []).filter(s => s.season_number > 0);
  select.innerHTML = seasons.map(s => `<option value="${s.season_number}" ${s.season_number == actS ? 'selected':''}>Saison ${s.season_number}</option>`).join('');
  await buildEpisodesGrid(tvId, select.value, actE);
}

async function onSeasonChange() {
  await buildEpisodesGrid(currentMedia.id, document.getElementById('select-season').value, 1);
  await selectEp(document.getElementById('select-season').value, 1);
}

async function buildEpisodesGrid(tvId, sNum, actE) {
  const data = await queryTMDB(`tv/${tvId}/season/${sNum}`);
  document.getElementById('grid-episodes').innerHTML = (data.episodes || []).map(e => `
    <button class="ep-btn ${e.episode_number == actE ? 'active':''}" id="ep-${e.episode_number}" onclick="selectEp(${sNum}, ${e.episode_number})">${e.episode_number}</button>
  `).join('');
}

async function selectEp(s, e) {
  currentMedia.season = s; currentMedia.episode = e;
  document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
  if(document.getElementById(`ep-${e}`)) document.getElementById(`ep-${e}`).classList.add('active');
  document.getElementById('p-subtitle').innerText = `Saison ${s} • Épisode ${e}`;
  killVideo();
  await loadLinksFromWorker();
  saveHisto();
}

function killVideo() {
  const v = document.getElementById('main-video');
  v.pause(); v.src = '';
  if(hls) { hls.destroy(); hls = null; }
}

function closePlayer() {
  killVideo();
  document.getElementById('p-modal').classList.remove('show');
  loadHistoUI();
}

function saveHisto() {
  let list = JSON.parse(localStorage.getItem('niss_history')) || [];
  list = list.filter(h => !(h.id === currentMedia.id && h.type === currentMedia.type));
  list.unshift({ ...currentMedia, time: Date.now() });
  localStorage.setItem('niss_history', JSON.stringify(list.slice(0, 10)));
}

function deleteHistoItem(id, type, e) {
  e.stopPropagation();
  let list = JSON.parse(localStorage.getItem('niss_history')) || [];
  list = list.filter(h => !(h.id === id && h.type === type));
  localStorage.setItem('niss_history', JSON.stringify(list));
  loadHistoUI();
}

function loadHistoUI() {
  const list = JSON.parse(localStorage.getItem('niss_history')) || [];
  const sec = document.getElementById('sec-histo');
  if(!list.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  document.getElementById('histo-wrap').innerHTML = `<div class="histo-grid">${list.map(h => `<div class="hcard" onclick="openPlayer('${h.id}', '${h.type}', '${h.title.replace(/'/g, "\\'")}', '${h.poster}', ${h.season}, ${h.episode})"><button class="hcard-del" onclick="deleteHistoItem('${h.id}', '${h.type}', event)">✕</button><img src="${h.poster}"><div class="hcard-info"><div class="hcard-title">${h.title}</div><div class="hcard-date">${h.type === 'movie' ? 'Film' : `S${h.season} E${h.episode}`}</div></div></div>`).join('')}</div>`;
}

window.addEventListener('DOMContentLoaded', initPage);
window.addEventListener('click', (e) => { if(!e.target.closest('.search-bar')) sDrop.classList.remove('show'); });
</script>
</body>
</html>
