name: Mise à jour complète

on:
  push:
    paths:
      - 'sources.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lancer la mise à jour
        run: node update.js
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add providers/*.js domains.json manifest.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update"
          git push
